<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация на зачет</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Дифференцированный зачет</h1>
        <p>Учебная практика «Медицинский уход»</p>

        <form id="registrationForm">
            <div class="form-group">
                <label for="fullName">ФИО студента:</label>
                <input type="text" id="fullName" placeholder="Иванов Иван Иванович" required>
            </div>
            <div class="form-group">
                <label for="groupNumber">Номер группы:</label>
                <input type="text" id="groupNumber" placeholder="1201" required>
            </div>
            <button type="submit">Зарегистрироваться и получить билет</button>
        </form>

        <div id="ticketResult" class="ticket-container" style="display:none;">
            <!-- Сюда будет вставлен результат -->
        </div>

        <hr>

        <!-- Блок управления списком -->
        <div class="list-controls">
            <button id="downloadList" class="btn-green">📥 Скачать список (.csv)</button>
            <button id="toggleList" class="btn-blue">👁 Показать список</button>
            <button id="clearList" class="btn-red">🗑 Очистить список</button>
        </div>

        <!-- Сам список (изначально скрыт) -->
        <div id="registrationListWrapper" style="display:none;">
            <h3>Список зарегистрированных студентов</h3>
            <div id="registrationList">
                <!-- Записи вставляются через JS -->
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
